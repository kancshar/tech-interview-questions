<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Questions Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #64ffda;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* Form Section */
        #form-section {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #0f3460;
        }
        #form-section.collapsed {
            padding: 1rem 2rem;
        }
        #form-section.collapsed .form-body { display: none; }
        #form-section.collapsed .form-summary { display: block; }
        .form-summary {
            display: none;
            color: #64ffda;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #0a0a1a;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            resize: vertical;
        }
        input:focus, textarea:focus { border-color: #64ffda; }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #64ffda;
            color: #1a1a2e;
        }
        .btn-primary:hover { background: #4ad4b0; }
        .btn-primary:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #0f3460;
            color: #64ffda;
            margin-left: 0.5rem;
        }
        .btn-secondary:hover { background: #1a4a7a; }

        /* Chat Section */
        #chat-section {
            display: none;
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #0f3460;
            margin-bottom: 1.5rem;
        }
        #chat-messages {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .chat-msg {
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .chat-msg.user {
            background: #0f3460;
            text-align: right;
        }
        .chat-msg.assistant {
            background: #1a3a5c;
            color: #64ffda;
        }
        #chat-input-area {
            display: flex;
            gap: 0.5rem;
        }
        #chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #0a0a1a;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
        }
        #chat-input:focus { border-color: #64ffda; }

        /* Output Section */
        #output-section {
            display: none;
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #0f3460;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .output-header h2 {
            color: #64ffda;
            font-size: 1.2rem;
        }
        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 0.75rem;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px 8px 0 0;
            background: #0a0a1a;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #64ffda; border-color: #64ffda; }
        .tab-btn.active {
            background: #0f3460;
            color: #64ffda;
            border-color: #64ffda;
        }
        .tab-content {
            display: none;
            background: #0a0a1a;
            border-radius: 8px;
            padding: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .tab-content.active { display: block; }
        .tab-content h3 { color: #e0e0e0; font-size: 1rem; margin: 0.8rem 0 0.3rem; }
        .tab-content p { margin: 0.4rem 0; }
        .tab-content strong { color: #64ffda; }
        .tab-content em { color: #888; }
        .tab-content hr { border: none; border-top: 1px solid #0f3460; margin: 1rem 0; }
        #markdown-content {
            background: #0a0a1a;
            border-radius: 8px;
            padding: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.6;
        }
        #markdown-content h1 { color: #64ffda; font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        #markdown-content h2 { color: #4ad4b0; font-size: 1.2rem; margin: 1.2rem 0 0.5rem; border-bottom: 1px solid #0f3460; padding-bottom: 0.3rem; }
        #markdown-content h3 { color: #e0e0e0; font-size: 1rem; margin: 0.8rem 0 0.3rem; }
        #markdown-content p { margin: 0.4rem 0; }
        #markdown-content strong { color: #64ffda; }
        #markdown-content em { color: #888; }
        #markdown-content table { border-collapse: collapse; margin: 0.5rem 0; width: 100%; }
        #markdown-content th, #markdown-content td { border: 1px solid #0f3460; padding: 0.4rem 0.8rem; text-align: left; }
        #markdown-content th { background: #0f3460; }
        #markdown-content hr { border: none; border-top: 1px solid #0f3460; margin: 1rem 0; }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #64ffda;
        }
        .loading.active { display: block; }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #0f3460;
            border-top: 3px solid #64ffda;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interview Questions Generator</h1>
        <p class="subtitle">Generate tailored interview questions based on tech stack and experience</p>

        <!-- Form Section -->
        <div id="form-section">
            <div class="form-summary" id="form-summary"></div>
            <div class="form-body">
                <div class="form-group">
                    <label for="tech-stack">Tech Stack (comma-separated)</label>
                    <textarea id="tech-stack" rows="3" placeholder="e.g. Python, FastAPI, PostgreSQL, Docker, Redis"></textarea>
                </div>
                <div class="form-group">
                    <label for="experience">Years of Experience</label>
                    <input type="number" id="experience" min="0" max="50" value="5" placeholder="e.g. 5">
                </div>
                <div class="form-group">
                    <label for="projects">Projects (optional)</label>
                    <textarea id="projects" rows="3" placeholder="e.g. Built a real-time chat app, Designed microservices for e-commerce platform"></textarea>
                </div>
                <button class="btn btn-primary" id="generate-btn" onclick="generateQuestions()">
                    Generate Questions
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <span class="spinner"></span> Generating questions... This may take a moment.
        </div>

        <!-- Approval Section (Human-in-the-Loop) -->
        <div id="approval-section" style="display:none;">
            <div style="background:#16213e; border-radius:12px; padding:2rem; border:1px solid #0f3460; margin-bottom:1.5rem;">
                <h2 style="color:#64ffda; margin-bottom:1rem;">Review Profile Analysis</h2>
                <p style="color:#aaa; margin-bottom:1rem;" id="approval-message"></p>
                <div class="form-group">
                    <label>Seniority Level</label>
                    <select id="seniority-select" style="width:100%; padding:0.75rem 1rem; border:1px solid #0f3460; border-radius:8px; background:#0a0a1a; color:#e0e0e0; font-size:1rem;">
                        <option value="junior">Junior</option>
                        <option value="mid">Mid</option>
                        <option value="senior">Senior</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categories (edit, add, or remove as needed)</label>
                    <div id="category-chips" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.75rem;"></div>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="text" id="new-category-input" placeholder="Add a new category..." style="flex:1; padding:0.6rem 1rem; border:1px solid #0f3460; border-radius:8px; background:#0a0a1a; color:#e0e0e0; font-size:0.9rem;">
                        <button class="btn btn-secondary" onclick="addCategory()">+ Add</button>
                    </div>
                </div>
                <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                    <button class="btn btn-primary" id="approve-btn" onclick="approveCategories()">✓ Approve & Generate</button>
                    <button class="btn btn-secondary" onclick="goBackFromApproval()">← Back</button>
                </div>
            </div>
        </div>

        <!-- Chat Section (for refinements) -->
        <div id="chat-section">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="e.g. Add more system design questions, make Python questions harder...">
                <button class="btn btn-primary" id="chat-btn" onclick="sendRefinement()">Send</button>
            </div>
        </div>

        <!-- Output Section -->
        <div id="output-section">
            <div class="output-header">
                <h2>Generated Questions</h2>
                <div>
                    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
                    <button class="btn btn-secondary" onclick="downloadMarkdown()">Download .md</button>
                </div>
            </div>
            <div class="tabs" id="category-tabs"></div>
            <div id="tab-panels"></div>
            <div id="markdown-content" style="display:none;"></div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let currentCategories = [];

        async function generateQuestions() {
            const techInput = document.getElementById('tech-stack').value.trim();
            const experience = parseInt(document.getElementById('experience').value);
            const projects = document.getElementById('projects').value.trim();

            if (!techInput) {
                alert('Please enter a tech stack');
                return;
            }

            const techStack = techInput.split(',').map(t => t.trim()).filter(t => t);

            // Disable button, show loading
            document.getElementById('generate-btn').disabled = true;
            document.getElementById('loading').classList.add('active');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tech_stack: techStack,
                        experience_years: experience,
                        projects: projects
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Profile analysis failed');
                }

                const data = await response.json();
                sessionId = data.session_id;
                currentCategories = data.categories;

                // Show approval section
                showApprovalStep(data);

            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('generate-btn').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        function showApprovalStep(data) {
            // Collapse form
            const formSection = document.getElementById('form-section');
            formSection.classList.add('collapsed');
            document.getElementById('form-summary').textContent =
                `Profile: ${document.getElementById('tech-stack').value.trim()} | ${document.getElementById('experience').value} years`;

            // Populate approval section
            document.getElementById('approval-message').textContent = data.message;
            document.getElementById('seniority-select').value = data.seniority_level;
            renderCategoryChips(data.categories);

            document.getElementById('approval-section').style.display = 'block';
        }

        function renderCategoryChips(categories) {
            currentCategories = [...categories];
            const container = document.getElementById('category-chips');
            container.innerHTML = '';
            categories.forEach((cat, i) => {
                const chip = document.createElement('span');
                chip.style.cssText = 'display:inline-flex; align-items:center; gap:0.4rem; padding:0.4rem 0.8rem; background:#0f3460; border:1px solid #64ffda; border-radius:20px; color:#64ffda; font-size:0.85rem;';
                chip.innerHTML = `${cat} <span onclick="removeCategory(${i})" style="cursor:pointer; color:#ff6b6b; font-weight:bold;">×</span>`;
                container.appendChild(chip);
            });
        }

        function removeCategory(index) {
            currentCategories.splice(index, 1);
            renderCategoryChips(currentCategories);
        }

        function addCategory() {
            const input = document.getElementById('new-category-input');
            const val = input.value.trim();
            if (val && !currentCategories.includes(val)) {
                currentCategories.push(val);
                renderCategoryChips(currentCategories);
                input.value = '';
            }
        }

        async function approveCategories() {
            if (currentCategories.length === 0) {
                alert('Please add at least one category');
                return;
            }

            const seniority = document.getElementById('seniority-select').value;

            document.getElementById('approve-btn').disabled = true;
            document.getElementById('loading').classList.add('active');

            try {
                const response = await fetch('/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        categories: currentCategories,
                        seniority_level: seniority
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Generation failed');
                }

                const data = await response.json();

                // Hide approval, show output
                document.getElementById('approval-section').style.display = 'none';
                renderMarkdown(data.markdown);
                document.getElementById('chat-section').style.display = 'block';
                document.getElementById('output-section').style.display = 'block';
                addChatMessage('assistant', data.message);

            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('approve-btn').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        function goBackFromApproval() {
            document.getElementById('approval-section').style.display = 'none';
            const formSection = document.getElementById('form-section');
            formSection.classList.remove('collapsed');
            sessionId = null;
            currentCategories = [];
        }

        async function sendRefinement() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !sessionId) return;

            addChatMessage('user', message);
            input.value = '';
            document.getElementById('chat-btn').disabled = true;
            document.getElementById('loading').classList.add('active');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Refinement failed');
                }

                const data = await response.json();
                renderMarkdown(data.markdown);
                addChatMessage('assistant', data.message);

            } catch (error) {
                addChatMessage('assistant', 'Error: ' + error.message);
            } finally {
                document.getElementById('chat-btn').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        function renderMarkdown(md) {
            // Store raw markdown for download
            document.getElementById('markdown-content').innerHTML = marked.parse(md);

            // Parse categories from markdown (split by ## headings)
            const tabs = document.getElementById('category-tabs');
            const panels = document.getElementById('tab-panels');
            tabs.innerHTML = '';
            panels.innerHTML = '';

            // Split into sections by ## (category headings)
            const sections = md.split(/^## /m).filter(s => s.trim());

            // First section is usually the profile/summary (before categories)
            const categories = [];
            let profileSection = '';

            sections.forEach(section => {
                const lines = section.split('\n');
                const title = lines[0].trim();

                // Skip profile/overview sections — they contain headers or summary info, not questions
                if (title === 'Candidate Profile' || title.includes('Interview Questions') || title.startsWith('#')) {
                    profileSection += '## ' + section;
                } else {
                    categories.push({ title, content: '## ' + section });
                }
            });

            if (categories.length === 0) {
                // Fallback: no categories parsed, show raw markdown
                document.getElementById('tab-panels').innerHTML = `<div class="tab-content active">${marked.parse(md)}</div>`;
                return;
            }

            // Add "Overview" tab if there's profile info
            if (profileSection) {
                categories.unshift({ title: 'Overview', content: profileSection });
            }

            // Create tabs and panels
            categories.forEach((cat, i) => {
                // Tab button
                const btn = document.createElement('button');
                btn.className = `tab-btn${i === 0 ? ' active' : ''}`;
                btn.textContent = cat.title;
                btn.onclick = () => switchTab(i);
                tabs.appendChild(btn);

                // Panel
                const panel = document.createElement('div');
                panel.className = `tab-content${i === 0 ? ' active' : ''}`;
                panel.innerHTML = marked.parse(cat.content);
                panels.appendChild(panel);
            });
        }

        function switchTab(index) {
            const btns = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.tab-content');
            btns.forEach((btn, i) => btn.classList.toggle('active', i === index));
            panels.forEach((panel, i) => panel.classList.toggle('active', i === index));
        }

        function addChatMessage(role, text) {
            const msgs = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `chat-msg ${role}`;
            div.textContent = text;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function downloadMarkdown() {
            if (!sessionId) return;
            window.open(`/download/${sessionId}`, '_blank');
        }

        function goBack() {
            document.getElementById('output-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'none';
            document.getElementById('approval-section').style.display = 'none';
            const formSection = document.getElementById('form-section');
            formSection.classList.remove('collapsed');
            document.getElementById('markdown-content').innerHTML = '';
            document.getElementById('category-tabs').innerHTML = '';
            document.getElementById('tab-panels').innerHTML = '';
            document.getElementById('chat-messages').innerHTML = '';
            sessionId = null;
            currentCategories = [];
        }

        // Enter key to send chat
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendRefinement();
        });

        // Enter key on form inputs to generate
        document.getElementById('tech-stack').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') generateQuestions();
        });
    </script>
</body>
</html>
